name: start-onboarding

# Sends the entry email ("What do you want to learn today?") linking to the
# onboarding form. Run by hand (Actions → start-onboarding → Run workflow).
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund

      - name: Render onboarding page
        env:
          QUIZ_WEBHOOK_URL: ${{ vars.QUIZ_WEBHOOK_URL }}
        run: node scripts/render-onboard-page.mjs

      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy lessons --project-name=mysensei-lessons --branch=main --commit-dirty=true

      - name: Email the entry link
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
          MAIL_TO: ${{ vars.MAIL_TO }}
          EMAIL_SUBJECT: "mySensei — what do you want to learn today?"
          EMAIL_INTRO: "Tell me what you'd like to learn and a few preferences. I'll research it, send a short placement check, then build your course."
          EMAIL_URL: ${{ vars.LESSONS_BASE_URL }}/onboard.html
        run: node scripts/email-link.mjs

      - name: Commit onboarding page
        run: |
          git config user.name "mySensei bot"
          git config user.email "bot@users.noreply.github.com"
          git add lessons/onboard.html
          git commit -m "onboarding: entry form page" || echo "nothing to commit"
          git push
