name: build-curriculum

# Triggered when the learner submits the placement check (via the worker).
# Claude judges the level, builds the outline (chunk-size ladder), then sends
# the syllabus and the first lesson.
on:
  repository_dispatch:
    types: [assessment-result]

permissions:
  contents: write

concurrency:
  group: mysensei-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund

      - name: Judge level + build curriculum
        env:
          ASSESSMENT_RESULTS: ${{ toJSON(github.event.client_payload.results) }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/build-curriculum.mjs

      - name: Generate first lesson
        env:
          MYSENSEI_FORCE: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          QUIZ_WEBHOOK_URL: ${{ vars.QUIZ_WEBHOOK_URL }}
        run: npm run --silent generate

      - name: Render syllabus
        env:
          MYSENSEI_RENDER_ONLY: "1"
          QUIZ_WEBHOOK_URL: ${{ vars.QUIZ_WEBHOOK_URL }}
        run: node scripts/send-syllabus.mjs

      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy lessons --project-name=mysensei-lessons --branch=main --commit-dirty=true

      - name: Email the syllabus (with approve button)
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
          MAIL_TO: ${{ vars.MAIL_TO }}
          LESSONS_BASE_URL: ${{ vars.LESSONS_BASE_URL }}
          QUIZ_WEBHOOK_URL: ${{ vars.QUIZ_WEBHOOK_URL }}
        run: node scripts/send-syllabus.mjs

      - name: Commit
        run: |
          git config user.name "mySensei bot"
          git config user.email "bot@users.noreply.github.com"
          git add curriculum.json lessons/
          git commit -m "build: curriculum from placement check + first lesson" || echo "nothing to commit"
          git pull --rebase origin main
          git push
