name: cadence

# Fires hourly; the generator decides whether a lesson is actually due based on
# the learner's timezone, delivery time, cadence, and workweek (curriculum.json).
# You can also run it by hand (Actions tab → cadence → Run workflow) to force one now.
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Send a lesson now regardless of schedule"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: mysensei-cadence
  cancel-in-progress: false

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund

      - name: Generate next lesson
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          QUIZ_WEBHOOK_URL: ${{ vars.QUIZ_WEBHOOK_URL }}
          MYSENSEI_FORCE: ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '1' || '' }}
        run: npm run --silent generate

      - name: Publish lesson to Cloudflare Pages
        if: steps.gen.outputs.sent == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy lessons --project-name=mysensei-lessons --branch=main --commit-dirty=true

      - name: Email the lesson
        if: steps.gen.outputs.sent == 'true'
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
          MAIL_TO: ${{ vars.MAIL_TO }}
          LESSONS_BASE_URL: ${{ vars.LESSONS_BASE_URL }}
        run: npm run --silent send

      - name: Commit progress + lesson
        if: steps.gen.outputs.sent == 'true'
        run: |
          git config user.name "mySensei bot"
          git config user.email "bot@users.noreply.github.com"
          git add curriculum.json lessons/
          git commit -m "lesson: ${{ steps.gen.outputs.path }}" || echo "nothing to commit"
          git pull --rebase origin main
          git push
