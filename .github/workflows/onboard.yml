name: onboard

# Triggered when the learner submits the onboarding form (via the worker).
# Researches the subject, builds the placement check, and emails its link.
on:
  repository_dispatch:
    types: [onboard]

permissions:
  contents: read

concurrency:
  group: mysensei-onboard
  cancel-in-progress: false

jobs:
  onboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund

      - name: Research + build placement check
        env:
          ONBOARD_PAYLOAD: ${{ toJSON(github.event.client_payload) }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COURSE_ID: ${{ github.event.client_payload.courseId }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_TOKEN }}
          MAIL_TO: ${{ vars.MAIL_TO }}
        run: node scripts/onboard.mjs

      - name: Email the assessment link
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
          MAIL_TO: ${{ github.event.client_payload.email }}
          EMAIL_SUBJECT: "mySensei — your placement check"
          EMAIL_INTRO: "Here's a short placement check. Answer the questions and I'll judge your level, build your course, and email your syllabus."
          EMAIL_URL: ${{ vars.APP_BASE_URL }}/c/${{ github.event.client_payload.courseId }}/assessment
        run: node scripts/email-link.mjs
