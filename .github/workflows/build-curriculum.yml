name: build-curriculum

# Triggered when the learner submits the placement check (via the worker).
# Claude judges the level, builds the outline (chunk-size ladder), then sends
# the syllabus and the first lesson.
on:
  repository_dispatch:
    types: [assessment-result]

permissions:
  contents: read

concurrency:
  group: mysensei-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund

      - name: Judge level + build curriculum
        env:
          ASSESSMENT_RESULTS: ${{ toJSON(github.event.client_payload.results) }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COURSE_ID: ${{ github.event.client_payload.courseId }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_TOKEN }}
        run: node scripts/build-curriculum.mjs

      - name: Generate first lesson
        env:
          MYSENSEI_FORCE: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COURSE_ID: ${{ github.event.client_payload.courseId }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_TOKEN }}
        run: npm run --silent generate

      - name: Email the syllabus (with approve button)
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
          MAIL_TO: ${{ vars.MAIL_TO }}
          COURSE_ID: ${{ github.event.client_payload.courseId }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_TOKEN }}
        run: node scripts/send-syllabus.mjs

      - name: Report failure to owner
        if: failure()
        env:
          COURSE_ID: ${{ github.event.client_payload.courseId }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_TOKEN }}
          OWNER_EMAIL: ${{ vars.OWNER_EMAIL }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node scripts/report-failure.mjs
