name: onboard

# Triggered when the learner submits the onboarding form (via the worker).
# Researches the subject, builds the placement check, publishes the assessment
# page, and emails its link.
on:
  repository_dispatch:
    types: [onboard]

permissions:
  contents: write

concurrency:
  group: mysensei-onboard
  cancel-in-progress: false

jobs:
  onboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund

      - name: Research + build placement check
        env:
          ONBOARD_PAYLOAD: ${{ toJSON(github.event.client_payload) }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          QUIZ_WEBHOOK_URL: ${{ vars.QUIZ_WEBHOOK_URL }}
          MAIL_TO: ${{ vars.MAIL_TO }}
        run: node scripts/onboard.mjs

      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy lessons --project-name=mysensei-lessons --branch=main --commit-dirty=true

      - name: Email the assessment link
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
          MAIL_TO: ${{ github.event.client_payload.email }}
          EMAIL_SUBJECT: "mySensei — your placement check"
          EMAIL_INTRO: "Here's a short placement check. Answer the questions and I'll judge your level, build your course, and email your syllabus."
          EMAIL_URL: ${{ vars.LESSONS_BASE_URL }}/assessment.html
        run: node scripts/email-link.mjs

      - name: Commit
        run: |
          git config user.name "mySensei bot"
          git config user.email "bot@users.noreply.github.com"
          git add curriculum.json lessons/
          git commit -m "onboard: placement check for new subject" || echo "nothing to commit"
          git push
