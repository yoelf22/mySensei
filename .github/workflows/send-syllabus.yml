name: send-syllabus

# Renders the syllabus, publishes it to Cloudflare Pages, and emails a one-click link.
# Run by hand (Actions → send-syllabus → Run workflow) after onboarding.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund

      - name: Render syllabus
        env:
          MYSENSEI_RENDER_ONLY: "1"
        run: node scripts/send-syllabus.mjs

      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy lessons --project-name=mysensei-lessons --branch=main --commit-dirty=true

      - name: Email the syllabus link
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
          MAIL_TO: ${{ vars.MAIL_TO }}
          LESSONS_BASE_URL: ${{ vars.LESSONS_BASE_URL }}
        run: node scripts/send-syllabus.mjs

      - name: Commit syllabus
        run: |
          git config user.name "mySensei bot"
          git config user.email "bot@users.noreply.github.com"
          git add lessons/course-syllabus.html
          git commit -m "syllabus: standalone document (hosted)" || echo "nothing to commit"
          git push
