name: start-lessons

# Triggered when the learner approves their syllabus (via the worker). Emails
# Lesson 1 — which build-curriculum already generated — so it lands immediately,
# with no generation wait.
on:
  repository_dispatch:
    types: [syllabus-approved]

permissions:
  contents: read

concurrency:
  group: mysensei-start-lessons
  cancel-in-progress: false

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund

      - name: Approve the syllabus (awaiting-approval -> active)
        env:
          COURSE_ID: ${{ github.event.client_payload.courseId }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_TOKEN }}
        run: npm run --silent approve

      - name: Generate the first lesson
        env:
          MYSENSEI_FORCE: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COURSE_ID: ${{ github.event.client_payload.courseId }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_TOKEN }}
        run: npm run --silent generate

      - name: Email the first lesson
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
          MAIL_TO: ${{ vars.MAIL_TO }}
          COURSE_ID: ${{ github.event.client_payload.courseId }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_TOKEN }}
        run: npm run --silent send
